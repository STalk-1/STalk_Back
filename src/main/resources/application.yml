springdoc:
    api-docs:
        enabled: true
    swagger-ui:
        enabled: true

server:
    port: 8080

spring:
    application:
        name: stalk-api

    datasource:
        url: jdbc:h2:mem:stalk:testdb
        driver-class-name: org.h2.Driver
        username: sa
        password:

    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                format_sql: true
        # show-sql: true

    h2:
        console:
            enabled: true
            path: /h2-console

# dev에서만 느슨하게 CORS 허용(필요에 따라 프론트 도메인으로 좁히rl)
app:
    cors:
        allowed-origins:
            - "*"
        # 배포된 프론트 도메인도 여기에 추가 (예: https://stalk-front.vercel.app)

kakao:
    oauth:
        client-id: ${KAKAO_CLIENT_ID}
        redirect-uri: ${KAKAO_REDIRECT_URI}
        token-uri: https://kauth.kakao.com/oauth/token
        user-uri: https://kapi.kakao.com/v2/user/me

jwt:
    issuer: stalk
    secret: ${JWT_SECRET}
    access-token-seconds: 900        # 15분
    refresh-token-seconds: 1209600   # 14일


kis:
    base-url: https://openapi.koreainvestment.com:9443  # 실전
    appkey: ${KIS_APPKEY}
    appsecret: ${KIS_APPSECRET}
    custtype: P                 # 개인: P, 법인: B

    token:
        path: /oauth2/tokenP

    domestic: # 주식 현재가 조회용
        inquire-price-path: /uapi/domestic-stock/v1/quotations/inquire-price
        tr-id-inquire-price: FHKST01010100

quotes:
    poll:
        enabled: true
        fixed-delay-ms: 30000
    watchlist:
        - "000660"  # SK하이닉스
        - "005930"  # 삼성전자
        - "009150"  # 삼성전기
        - "034730"  # SK
        - "005380"  # 현대차
        - "079550"  # LIG넥스원
        - "272210"  # 한화시스템
        - "064350"  # 현대로템
        - "011200"  # HMM
        - "006800"  # 미래에셋증권
